<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quiz App</title>

    <style>
        body {
            font-family: Arial;
            background: #667eea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #quiz-container {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            cursor: pointer;
        }

        .correct {
            background: green;
            color: white;
        }

        .wrong {
            background: red;
            color: white;
        }

        #nxt-btn {
            margin-top: 10px;
            padding: 10px;
            display: none;
        }
    </style>
</head>

<body>
<div id="quiz-container">
    <h2 id="question">Question Text</h2>
    <div id="answer"></div>
    <button id="nxt-btn">Next</button>
</div>

<script>
const questions = [
{
    question: "Which team has won the most IPL titles?",
    answers: [
        {text: "Chennai Super Kings", correct: false},
        {text: "Mumbai Indians", correct: true},
        {text: "Royal Challengers Bangalore", correct: false},
        {text: "Kolkata Knight Riders", correct: false}
    ]
},
{
    question: "Who is known as 'Captain Cool' in IPL?",
    answers: [
        {text: "Virat Kohli", correct: false},
        {text: "MS Dhoni", correct: true},
        {text: "Rohit Sharma", correct: false},
        {text: "KL Rahul", correct: false}
    ]
},
{
    question: "Which player has scored the most runs in IPL history?",
    answers: [
        {text: "Rohit Sharma", correct: false},
        {text: "MS Dhoni", correct: false},
        {text: "Virat Kohli", correct: true},
        {text: "David Warner", correct: false}
    ]
},
{
    question: "Which team is known as RCB?",
    answers: [
        {text: "Rajasthan Royals", correct: false},
        {text: "Royal Challengers Bangalore", correct: true},
        {text: "Rising Pune Supergiant", correct: false},
        {text: "Punjab Kings", correct: false}
    ]
},
{
    question: "Which IPL team is based in Chennai?",
    answers: [
        {text: "Delhi Capitals", correct: false},
        {text: "Chennai Super Kings", correct: true},
        {text: "Sunrisers Hyderabad", correct: false},
        {text: "Lucknow Super Giants", correct: false}
    ]
},
{
    question: "Who has taken the most wickets in IPL history?",
    answers: [
        {text: "Bhuvneshwar Kumar", correct: false},
        {text: "Dwayne Bravo", correct: true},
        {text: "Jasprit Bumrah", correct: false},
        {text: "Lasith Malinga", correct: false}
    ]
},
{
    question: "Which player hit the first century in IPL history?",
    answers: [
        {text: "Chris Gayle", correct: false},
        {text: "Brendon McCullum", correct: true},
        {text: "Virender Sehwag", correct: false},
        {text: "Adam Gilchrist", correct: false}
    ]
},
{
    question: "Which team won the first IPL season (2008)?",
    answers: [
        {text: "Chennai Super Kings", correct: false},
        {text: "Mumbai Indians", correct: false},
        {text: "Rajasthan Royals", correct: true},
        {text: "Kolkata Knight Riders", correct: false}
    ]
},
{
    question: "Which player is known as 'Universe Boss'?",
    answers: [
        {text: "Andre Russell", correct: false},
        {text: "Chris Gayle", correct: true},
        {text: "AB de Villiers", correct: false},
        {text: "Kieron Pollard", correct: false}
    ]
},
{
    question: "Which team changed its name from Delhi Daredevils?",
    answers: [
        {text: "Delhi Capitals", correct: true},
        {text: "Punjab Kings", correct: false},
        {text: "Gujarat Titans", correct: false},
        {text: "Sunrisers Hyderabad", correct: false}
    ]
},
{
    question: "Who has taken the most wickets in IPL history?",
    answers: [
        {text: "Bhuvneshwar Kumar", correct: false},
        {text: "Dwayne Bravo", correct: true},
        {text: "Jasprit Bumrah", correct: false},
        {text: "Lasith Malinga", correct: false}
    ]
},
{
    question: "Which player hit the first century in IPL history?",
    answers: [
        {text: "Chris Gayle", correct: false},
        {text: "Brendon McCullum", correct: true},
        {text: "Virender Sehwag", correct: false},
        {text: "Adam Gilchrist", correct: false}
    ]
},
{
    question: "Which team won the first IPL season (2008)?",
    answers: [
        {text: "Chennai Super Kings", correct: false},
        {text: "Mumbai Indians", correct: false},
        {text: "Rajasthan Royals", correct: true},
        {text: "Kolkata Knight Riders", correct: false}
    ]
},
{
    question: "Which player is known as 'Universe Boss'?",
    answers: [
        {text: "Andre Russell", correct: false},
        {text: "Chris Gayle", correct: true},
        {text: "AB de Villiers", correct: false},
        {text: "Kieron Pollard", correct: false}
    ]
},
{
    question: "Which team changed its name from Delhi Daredevils?",
    answers: [
        {text: "Delhi Capitals", correct: true},
        {text: "Punjab Kings", correct: false},
        {text: "Gujarat Titans", correct: false},
        {text: "Sunrisers Hyderabad", correct: false}
    ]
}

];

const questionElement = document.getElementById("question");
const answerButtons = document.getElementById("answer");
const nextButton = document.getElementById("nxt-btn");

let currentQuestionIndex = 0;
let score = 0;

function startQuiz(){
    currentQuestionIndex = 0;
    score = 0;
    nextButton.innerText = "Next";
    showQuestion();
}

function showQuestion(){
    resetState();
    let currentQuestion = questions[currentQuestionIndex];
    questionElement.innerText = currentQuestion.question;

    currentQuestion.answers.forEach(answer => {
        const button = document.createElement("button");
        button.innerText = answer.text;
        button.classList.add("btn");
        answerButtons.appendChild(button);

        if(answer.correct){
            button.dataset.correct = answer.correct;
        }

        button.addEventListener("click", selectAnswer);
    });
}

function resetState(){
    nextButton.style.display = "none";
    answerButtons.innerHTML = "";
}

function selectAnswer(e){
    const selectedBtn = e.target;
    const correct = selectedBtn.dataset.correct === "true";

    if(correct){
        selectedBtn.classList.add("correct");
        score++;
    } else {
        selectedBtn.classList.add("wrong");
    }

    Array.from(answerButtons.children).forEach(button => {
        if(button.dataset.correct === "true"){
            button.classList.add("correct");
        }
        button.disabled = true;
    });

    nextButton.style.display = "block";
}

function showScore(){
    resetState();
    questionElement.innerText = "Your Score: " + score + "/" + questions.length;
    nextButton.innerText = "Restart";
    nextButton.style.display = "block";
}

function handleNextButton(){
    currentQuestionIndex++;
    if(currentQuestionIndex < questions.length){
        showQuestion();
    } else {
        showScore();
    }
}

nextButton.addEventListener("click", () => {
    if(currentQuestionIndex < questions.length){
        handleNextButton();
    } else {
        startQuiz();
    }
});

startQuiz();
</script>
</body>
</html>
